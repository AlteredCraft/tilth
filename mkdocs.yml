site_name: Tilth
site_description: A minimal long-running agent harness against any OpenAI-compatible LLM endpoint.
site_author: Altered Craft
site_url: https://alteredcraft.github.io/tilth/
repo_url: https://github.com/AlteredCraft/tilth
repo_name: AlteredCraft/tilth
edit_uri: edit/main/docs/

docs_dir: docs

# This `nav:` doubles as the documentation map for both humans and agents.
# Each leaf entry has a short comment above it describing what the page covers
# and when you'd reach for it. Treat the comments as a topic index — open the
# linked `.md` for the full story.

nav:
  # Landing page: project pitch, Brain/Hands/Session at a glance, the four memory
  # channels, quickstart, and links into every other section. Start here if
  # you're new to the codebase.
  - Home: index.md

  - Getting started:
      # Prerequisites (Python 3.12, uv, git), `.env` setup, the full table of
      # required and optional `TILTH_*` env vars, tested provider/base-URL
      # combinations, and how to build the docs site locally.
      - Installation: getting-started/installation.md
      # End-to-end walkthrough of the two-step `tilth prep-feature` →
      # `tilth run` flow: the seeding interview, then the per-task lifecycle
      # (prompt assembly → tool-use loop → validators → evaluator verdict →
      # self-improvement → commit), what the console streams, and where to
      # look in `sessions/<id>/` after the run.
      - Running the demo: getting-started/running-the-demo.md
      # `tilth resume` semantics: skips `done` tasks, retries the trailing
      # `failed` one, resets wall-clock budget, preserves cumulative tokens.
      # Also covers resumable-session detection (the 5s heads-up before a
      # fresh run).
      - Resuming a session: getting-started/resuming.md
      # `tilth reset` tears down a session: `git worktree remove --force` +
      # `git branch -D session/<id>` + `rm -rf sessions/<id>/`. Idempotent,
      # destructive by design, gated by `[y/N]` (or `--yes`).
      - Resetting a session: getting-started/resetting.md
      # `tilth visualize` renders `events.jsonl` (plus `seed-meta.json` if
      # present, as a context panel above the timeline) as a self-contained
      # `chat.html` grouped by task. Read-only, safe to invoke mid-run.
      - Visualizing a session: getting-started/visualizing.md
      # The "honest version" of using Tilth on your own (non-demo) codebase:
      # what prep your repo actually needs (a clean git repo, optionally an
      # AGENTS.md), seeding with `tilth prep-feature`, the test-filename
      # convention, the caveats list, picking an evaluator model, when this is
      # the wrong tool, and what to do on a first run.
      - Using on your own project: getting-started/your-own-project.md

  - Architecture:
      # The Brain / Hands / Session split, generator/evaluator separation
      # (the evaluator in a fresh context across tasks, with per-task ledger
      # memory), repo layout, and the six load-bearing invariants. Read this
      # before extending the harness.
      - Overview: architecture/overview.md
      # The data-flow view of a run: what the per-task loop reads (system.md,
      # AGENTS.md, the seed slice, the acceptance tests, the worktree), what it
      # writes (commits, events.jsonl, summary.json, checkpoint.json,
      # proposed-learnings.md), and the three artifacts that feed back as
      # working memory (prd.json status, progress.txt, ledger). The
      # "what flows through" map — reach for it before Overview's who-does-what.
      - Anatomy of a run: architecture/anatomy-of-a-run.md
      # The memory channels that live *outside* the agent — `AGENTS.md`, git
      # history, `progress.txt`, `prd.json`, and the per-task evaluator ledger
      # — with a who-reads/who-writes table and the rationale for keeping state
      # out of the model's context.
      - Memory channels: architecture/memory-channels.md

  - Deep dives:
      # Index page for the code-level walk-throughs below. Reach for these
      # when extending, debugging, or reasoning about the safety story —
      # not needed just to *use* the harness.
      - Overview: deep-dives/index.md
      # Ralph (outer) vs. tool-use (inner) loops; what does and doesn't count
      # as an iteration; the inner-loop flowchart; why evaluator rejections eat
      # iterations; worst-case tokens-per-task formula.
      - The two loops: deep-dives/two-loops.md
      # The structured exchange the inner loop ends in: the worker presents a
      # `case` (submit_case), the evaluator returns a typed `verdict`
      # (submit_verdict + the six rejection categories), and a per-task ledger
      # gives the evaluator memory across iterations. The canonical home for
      # case / verdict / ledger; other pages link here.
      - The worker↔evaluator dialogue: deep-dives/worker-evaluator-dialogue.md
      # Where the token cap is set (`client.py`), where the running counter
      # lives (`Session.tokens_used` + `checkpoint.json`), the three call
      # sites that record tokens, why enforcement is between-task only, and
      # the known gaps (no $-cost, no per-model split, no headroom warning).
      - Token recording: deep-dives/token-recording.md
      # The visibility table: what the worker agent sees (its task, the whole
      # feature plan as context, a curated seed-context slice, its own task's
      # evaluator verdicts, AGENTS.md, progress tail, tool schemas) vs. what
      # the harness still hides (the `prd.json` file + status machinery,
      # `events.jsonl`, token counts, the worktree branch). The Phase 4
      # expansion softened the wall — read this for where it now sits.
      - Agent visibility: deep-dives/agent-visibility.md
      # `tilth prep-feature`'s interview engine: the seed bundle (prd.json +
      # tests + seed-meta.json), the InterviewFrontend / SeedSink protocols,
      # the narrowed tool surface (no bash / write_file / edit_file), the
      # atomic terminal write, and how a prepared session flows into
      # `tilth run`.
      - Seeding a session: deep-dives/seeding.md
      # The schema of `prd.json` — fields, validators, who reads what, where
      # the soft 1:1 convention between acceptance_criteria and test
      # assertions lives (in the seeder prompt, not the harness). Reach for
      # this when extending the seed shape, debugging "why did the worker
      # think it was done", or understanding what `_load_prd` actually
      # returns.
      - The PRD format: deep-dives/prd-json.md
      # The run-stopping outcomes (the four caps plus the empty-response /
      # no-case backstops) and which layer each operates at (session-level vs.
      # task-level). Cross-references the loops, token recording, and resume.
      - How the caps fit together: deep-dives/caps.md
      # What `tilth resume` actually mutates on wake: `wake()` reads checkpoint,
      # `_prepare_resume()` flips trailing `failed` task back to `pending` and
      # soft-unwinds the FAILED placeholder commit so the evaluator sees the
      # full cumulative diff on retry; per-task ledgers survive on disk. Also
      # covers resumable-session detection.
      - Resume mechanics: deep-dives/resume-mechanics.md
      # Step-by-step of `tilth reset`: resolve session id → recover paths from
      # checkpoint + `session_start` event → confirm → tear down. Idempotency
      # contract (already-missing pieces are skipped, not errored).
      - Reset mechanics: deep-dives/reset-mechanics.md
      # Where a run lives on disk: working tree under Tilth's
      # `sessions/<id>/workspace/`, the session's durable state (`prd.json`,
      # `progress.txt`, `seed-meta.json`, `ledger/`, `proposed-learnings.md`),
      # branch + worktree admin entry in the source repo's `.git`, plus a
      # reference table of every `events.jsonl` event type.
      - Session layout: deep-dives/session-layout.md

  - Reference:
      # Compact summary of the safety story: hard stops (the caps plus the
      # empty-response / no-case backstops), the `pre_tool` veto pattern list
      # (force pushes, `sudo`, `curl|wget ... | sh`, etc.), worktree file-tool
      # isolation, and an honest list of what is *not* guarded (no dollar cap,
      # no mid-task cutoff, no network allowlist).
      - Safety guards: reference/safety-guards.md

# Contributor-only references that live under docs/ for co-location but are
# deliberately excluded from the published nav. Listed here so --strict
# doesn't flag them as orphans.
not_in_nav: |
  assets/IMAGE_STYLE.md
  assets/SITE_STYLE.md

theme:
  name: material
  # Site visual identity — see docs/assets/SITE_STYLE.md ("Hex" style reference).
  # The palette accent + most colour mapping is done in docs/stylesheets/extra.css
  # via CSS custom-property overrides; the entries here just give Material a
  # consistent baseline (light scheme, custom primary/accent slots).
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  # `search` is enabled by default, but declaring a `plugins:` block disables
  # all defaults — list it explicitly so site search keeps working.
  - search
  # Click-to-zoom lightbox for images. Applies to every <img> by default; opt
  # out per-image with `{ .off-glb }` (see Material docs → reference/images).
  - glightbox

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details

extra_css:
  - stylesheets/extra.css
