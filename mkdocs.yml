site_name: Tilth
site_description: A minimal long-running agent harness against any OpenAI-compatible LLM endpoint.
site_author: Altered Craft
site_url: https://alteredcraft.github.io/tilth/
repo_url: https://github.com/AlteredCraft/tilth
repo_name: AlteredCraft/tilth
edit_uri: edit/main/docs/

docs_dir: docs

# This `nav:` doubles as the documentation map for both humans and agents.
# Each leaf entry has a short comment above it describing what the page covers
# and when you'd reach for it. Treat the comments as a topic index â€” open the
# linked `.md` for the full story.

nav:
  # Landing page: project pitch, Brain/Hands/Session at a glance, the
  # differentiators (autonomy â†’ evaluator / caps / hidden state / observability),
  # a `tilth visualize` screenshot, and links into every other section. Start
  # here if you're new to the codebase.
  - Home: index.md

  - Getting started:
      # Prerequisites (Python 3.12, uv, git), `.env` setup, the full table of
      # required and optional `TILTH_*` env vars, tested provider/base-URL
      # combinations, and how to build the docs site locally.
      - Installation: getting-started/installation.md
      # End-to-end walkthrough of a run: author the feature as markdown in a
      # named feature dir `<repo>/.tilth/<feature>/` (overview.md + one
      # T-NNN-*.md per task), then point `tilth run` at it â€” the per-task
      # lifecycle (prompt assembly â†’ tool-use loop â†’
      # submit_case â†’ evaluator verdict â†’ commit), what the console streams,
      # and where to look in `sessions/<id>/` after the run.
      - Running the demo: getting-started/running-the-demo.md
      # `tilth visualize` serves a read-only local web app over sessions/:
      # an index of runs + per-session chat views that tail an active run
      # in near-realtime. Same renderer live or replayed. Tilth's flagship
      # observability surface â€” reach for it during or after any run.
      - Visualizing a session: getting-started/visualizing.md
      # The session-lifecycle commands. `tilth info` (list all, or one session's
      # full dossier incl. the worktreeâ†”.git mapping) + `tilth config` (resolved
      # provider config + caps, keys masked) for read-only inspection.
      # `tilth resume`: re-reads the feature, retries the trailing `failed` task
      # (unwinding its FAILED placeholder), resets wall-clock, preserves
      # cumulative tokens. `tilth reset`: tears a session down (worktree + branch
      # + sessions/<id>/), idempotent, gated by `[y/N]`/`--yes`. Includes the
      # under-the-hood src pointers for each.
      - Resuming & resetting a session: getting-started/resuming-and-resetting.md
      # The "honest version" of using Tilth on your own (non-demo) codebase:
      # what prep your repo actually needs (a clean git repo, optionally an
      # AGENTS.md/CLAUDE.md), authoring `.tilth/<feature>/`, the caveats list,
      # picking an evaluator model, when this is the wrong tool, and what to
      # do on a first run.
      - Using on your own project: getting-started/your-own-project.md

  - Architecture:
      # The Brain / Hands / Session split, generator/evaluator separation
      # (the evaluator in a fresh context across tasks, with per-task ledger
      # memory), repo layout, and the seven load-bearing invariants. Read this
      # before extending the harness.
      - Overview: architecture/overview.md
      # The data-flow view of a run: what the per-task loop reads (system.md,
      # the project-context files, `.tilth/<feature>/`, the worktree), what it
      # writes (commits, events.jsonl, summary.json, checkpoint.json), and the
      # three artifacts that feed back as working memory (task-status.json,
      # progress.txt, ledger). The "what flows through" map â€” reach for it
      # before Overview's who-does-what.
      - Anatomy of a run: architecture/anatomy-of-a-run.md
      # The memory channels that live *outside* the agent â€” the project-context
      # files (AGENTS.md/CLAUDE.md), git history, `progress.txt`, the authored
      # task markdown, and the per-task evaluator ledger â€” with a
      # who-reads/who-writes table. Canonical home for the AGENTS.md scope rule.
      - Memory channels: architecture/memory-channels.md
      # The visibility table (invariant 2 made concrete): what the worker sees
      # (its task, the overview, the whole plan as context, its own task's
      # evaluator verdicts, project-context files, progress tail, tool schemas)
      # vs. what the harness hides (task-status.json, events.jsonl, token
      # counts, the worktree branch), the three failure modes hiding prevents,
      # and the system.md contract. Design rationale, not a code walk-through.
      - Agent visibility: architecture/agent-visibility.md

  - Deep dives:
      # Index page for the code-level walk-throughs below â€” each explains a
      # mechanic at a high level and points to the file.py:function that
      # implements it. Reach for these when extending, debugging, or reasoning
      # about the safety story â€” not needed just to *use* the harness.
      - Overview: deep-dives/index.md
      # The flagship feature page: Tilth's "hyper-observability" goal â€” every
      # run replays end-to-end via `tilth visualize`, and every prompt the
      # harness sends is recorded (prompt_assembled / memory_load / model_call).
      # Covers what exists now, the by-design and roadmap gaps, and the dev
      # practice of feeding a run's log to a co-dev agent to hunt anomalies.
      - Hyper-observability: deep-dives/hyper-observability.md
      # Ralph (outer) vs. tool-use (inner) loops; what does and doesn't count
      # as an iteration; the inner-loop flowchart; why evaluator rejections eat
      # iterations; and "What can stop a run" â€” the session- and task-level
      # caps plus the provider_failure / no_case backstops, with the cap-hit
      # screenshot. (Absorbs the former standalone caps page.)
      - The two loops: deep-dives/two-loops.md
      # The structured exchange the inner loop ends in: the worker presents a
      # `case` (submit_case), the evaluator returns a typed `verdict`
      # (submit_verdict + the six rejection categories), and a per-task ledger
      # gives the evaluator memory across iterations. The canonical home for
      # case / verdict / ledger; other pages link here.
      - The workerâ†”evaluator dialogue: deep-dives/worker-evaluator-dialogue.md
      # Where the dollar-spend cap is set (`client.py`), the canonical usage
      # record (`usage.py`: prompt/eval/cached/reasoning/cost, with cached &
      # reasoning as subsets), the single call site that records it
      # (`loop._chat_healthy` â†’ `Session.record_usage`), why enforcement is
      # between-task only, and how the provider's `cost` becomes the cap counter
      # (`Session.cost_used`) while token counts stay display-only.
      - Token recording: deep-dives/token-recording.md
      # The authored task format â€” `<repo>/.tilth/<feature>/` (overview.md +
      # one T-NNN-*.md per task): frontmatter and section parsing rules, the
      # templates `tilth run` prints when the directory is missing, the
      # harness-owned task-status.json overlay, and who reads each field.
      # Reach for this when authoring a feature or extending the task shape.
      - The task format: deep-dives/task-format.md
      # Where a run lives on disk: working tree under Tilth's
      # `sessions/<id>/workspace/`, the session's durable state
      # (`task-status.json`, `progress.txt`, `ledger/`), branch + worktree
      # admin entry in the source repo's `.git`, plus a reference table of
      # every `events.jsonl` event type.
      - Session layout: deep-dives/session-layout.md

  - Reference:
      # Compact summary of the safety story: hard stops (the caps table plus
      # the provider-health / no-case backstops, pointing to "What can stop a
      # run" for the full model), the `pre_tool` veto pattern list (force
      # pushes, `sudo`, `curl|wget ... | sh`, etc.), worktree file-tool
      # isolation, and an honest list of what is *not* guarded (no dollar cap,
      # no mid-task cutoff, no network allowlist).
      - Safety guards: reference/safety-guards.md
      # Maintainer release runbook: how Tilth gets to PyPI. The trusted-publishing
      # (OIDC) GitHub Actions workflow, the one-time pending-publisher + GitHub
      # environment setup, the version-bump â†’ tag â†’ publish flow, the manual
      # token fallback, and what does/doesn't ship in the wheel. Reach for this
      # when cutting a release or changing packaging.
      - Releasing to PyPI: reference/releasing.md

# Contributor-only references that live under docs/ for co-location but are
# deliberately excluded from the published nav. Listed here so --strict
# doesn't flag them as orphans.
not_in_nav: |
  assets/IMAGE_STYLE.md
  assets/SITE_STYLE.md

theme:
  name: material
  # Site visual identity â€” see docs/assets/SITE_STYLE.md ("Hex" style reference).
  # The palette accent + most colour mapping is done in docs/stylesheets/extra.css
  # via CSS custom-property overrides; the entries here just give Material a
  # consistent baseline (light scheme, custom primary/accent slots).
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  # `search` is enabled by default, but declaring a `plugins:` block disables
  # all defaults â€” list it explicitly so site search keeps working.
  - search
  # Click-to-zoom lightbox for images. Applies to every <img> by default; opt
  # out per-image with `{ .off-glb }` (see Material docs â†’ reference/images).
  - glightbox

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      # Render ```mermaid fences as diagrams (Material ships mermaid.js when this
      # custom fence is declared) instead of plain code blocks.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details

extra_css:
  - stylesheets/extra.css
