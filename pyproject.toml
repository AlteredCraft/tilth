[project]
name = "agent-harness"
version = "0.1.0"
description = "Minimal long-running agent harness against Ollama Cloud — Brain/Hands/Session split, Ralph loop, four memory channels."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.40",
    "pydantic>=2.6",
    "rich>=13.7",
    "python-dotenv>=1.0",
    "pytest>=8.0",
    "ruff>=0.5",
]

[project.scripts]
harness = "harness.loop:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["harness"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
